<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room Display — Robotics PRD Workshop</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
  body { overflow-x: hidden; }
  .stage { min-height: 100vh; padding: 28px 48px; display: flex; flex-direction: column; }
  .stage .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    position: sticky; top: 0; background: rgba(12,12,13,0.9); backdrop-filter: blur(6px); z-index: 30; padding: 6px 0; }
  .head-right { display:flex; align-items:center; gap:22px; }
  .rejoin { display:flex; flex-direction:column; align-items:flex-end; line-height:1.2; }
  .rejoin .mono { font-size:0.85rem; color:var(--text-dim); }
  .code-pill { font-family:var(--mono); font-weight:800; letter-spacing:0.14em; color:var(--accent);
    border:1px solid var(--accent-dim); border-radius:var(--radius); padding:2px 10px; margin-top:3px; font-size:1rem; }
  /* Images are never cropped: contain keeps the whole picture and its proportions. */
  .robot-img { width: min(50vw, 760px); max-width: 100%; max-height: 66vh; height: auto; object-fit: contain;
    border:1px solid var(--line); border-radius:var(--radius); background:var(--bg-2); }
  .robot-img.sticky { position: sticky; top: 76px; }
  /* Feature image + thumbnail carousel */
  .gallery { display:flex; flex-direction:column; gap:14px; min-width:0; }
  .gallery.center { align-items:center; }
  .feat-wrap { position:relative; width:100%; max-width:100%; }
  .feature-img { display:block; width:100%; max-width:100%; height:auto; object-fit:contain;
    border:1px solid var(--line); border-radius:var(--radius); background:var(--bg-2); }
  /* Drag-to-resize grip on the bottom-right corner of the feature image */
  .img-grip { position:absolute; right:-2px; bottom:-2px; width:38px; height:38px; cursor:nwse-resize;
    display:flex; align-items:flex-end; justify-content:flex-end; padding:3px 5px; z-index:5;
    color:#120a06; background:var(--accent); border-radius:10px 0 var(--radius) 0; font-size:1rem;
    line-height:1; opacity:0.85; user-select:none; touch-action:none; }
  .img-grip:hover { opacity:1; }
  /* Display size controls (font +/- and reset) — for the projector operator */
  .disp-ctl { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:70;
    display:flex; align-items:center; gap:8px; padding:7px 12px; opacity:0.35; transition:opacity .15s;
    background:rgba(12,12,13,0.9); border:1px solid var(--line-2); border-radius:999px; backdrop-filter:blur(6px); }
  .disp-ctl:hover { opacity:1; }
  .disp-ctl .dc-label { font-family:var(--mono); font-size:0.62rem; letter-spacing:0.1em; color:var(--text-mute);
    text-transform:uppercase; }
  .disp-ctl button { padding:4px 12px; font-size:0.9rem; font-weight:800; line-height:1; min-width:0; }
  .disp-ctl .dc-sep { width:1px; height:20px; background:var(--line-2); }
  .thumbs { display:flex; gap:12px; flex-wrap:wrap; }
  .thumbs.center { justify-content:center; }
  .thumb { width:132px; height:82px; object-fit:cover; border:2px solid var(--line-2);
    border-radius:var(--radius); cursor:pointer; opacity:0.6; transition:opacity .15s, border-color .15s, transform .1s; }
  .thumb:hover { opacity:1; transform:translateY(-2px); }
  .thumb.active { border-color:var(--accent); opacity:1; }
  .ai-note { font-family:var(--mono); font-size:0.72rem; color:var(--text-mute); text-transform:uppercase;
    letter-spacing:0.08em; margin-top:8px; }
  /* Compact header for round slides — frees vertical room so the image scales up. */
  .compact-head .head { margin-bottom: 8px; padding: 2px 0; }
  .compact-head .subbar { margin-bottom: 10px; padding: 7px 14px; }
  .compact-head .timer.big { font-size: 1.9rem; }
  .big-list li { margin-bottom:6px; }
  .fade { animation: fade 0.5s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(6px);} to {opacity:1; transform:none;} }
  .selected-pop { animation: pop 0.4s ease; }
  /* Presenter/recorder callouts on the presentation screen */
  .role-callout { display:flex; align-items:center; gap:12px; background:var(--bg-3);
    border:1px solid var(--accent); border-radius:var(--radius); padding:10px 18px; }
  .role-callout.rc-rec { border-color:var(--line-2); }
  .role-callout .rc-name { font-size:1.5rem; font-weight:800; letter-spacing:-0.01em; }
  @keyframes pop { 0%{transform:scale(0.7);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .join-name { animation: fade 0.5s ease; }
  /* Roster cards */
  .roster-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; align-content:flex-start; }
  .roster-card { background:var(--bg-3); border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:var(--radius); padding:12px 16px; }
  .roster-card .nm { font-size:1.45rem; font-weight:800; letter-spacing:-0.01em; }
  .roster-card .co { font-size:0.95rem; color:var(--text-dim); margin-top:2px; }
  .roster-join { flex:0 0 auto; text-align:center; background:var(--bg-2); border:1px solid var(--line);
    border-radius:var(--radius); padding:20px 26px; }
  .roster-join .qr img { width:200px; height:200px; }
  .roster-count { display:flex; align-items:baseline; }
  .roster-empty { grid-column:1/-1; background:var(--bg-2); border:1px dashed var(--line-2);
    border-radius:var(--radius); padding:28px 32px; }
  /* Submission status banner */
  .subbar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; padding:10px 16px;
    border:1px solid var(--line); border-radius:var(--radius); background:var(--bg-2); margin-bottom:14px; }
  .subbar .st-chip { display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:0.8rem;
    text-transform:uppercase; letter-spacing:0.06em; padding:5px 11px; border-radius:999px; border:1px solid var(--line-2); }
  /* Agenda list */
  .agenda-list { display:flex; flex-direction:column; gap:10px; }
  .agenda-row { display:flex; align-items:center; gap:20px; background:var(--bg-3); border:1px solid var(--line);
    border-left:3px solid var(--accent); border-radius:var(--radius); padding:14px 22px; }
  .agenda-num { font-family:var(--mono); font-weight:800; font-size:1.4rem; color:var(--accent); min-width:2.2ch; }
  .agenda-txt { font-size:1.35rem; font-weight:600; letter-spacing:-0.01em; }
  /* Live REC light (recording driven from the facilitator) */
  .rec-badge { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 60;
    display: inline-flex; align-items: center; gap: 9px; font-family: var(--mono); font-weight: 800;
    letter-spacing: 0.16em; font-size: 0.9rem; color: #ff5252; background: rgba(12,12,13,0.82);
    border: 1px solid rgba(255,82,82,0.5); border-radius: 999px; padding: 6px 16px; backdrop-filter: blur(6px); }
  .rec-badge.hidden { display: none; }
  .rec-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff2d2d;
    box-shadow: 0 0 0 0 rgba(255,45,45,0.7); animation: recpulse 1.3s infinite; }
  @keyframes recpulse {
    0% { box-shadow: 0 0 0 0 rgba(255,45,45,0.7); }
    70% { box-shadow: 0 0 0 11px rgba(255,45,45,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,45,45,0); }
  }
  /* Wheel of fortune */
  .wheel-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
  #wheelSpin { transform-box: fill-box; transform-origin: center; }
  .wheel-pointer { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.6)); }
</style>

<div class="scanline"></div>
<div id="recBadge" class="rec-badge hidden" role="status" aria-live="polite"><span class="rec-dot"></span> REC</div>
<div id="stage" class="stage"><div class="panel">Connecting to session…</div></div>
<div id="dispCtl" class="disp-ctl">
  <span class="dc-label">Text</span>
  <button id="fontDown" title="Smaller text">A−</button>
  <button id="fontUp" title="Larger text">A+</button>
  <span class="dc-sep"></span>
  <span class="dc-label">Drag ⤡ on image to resize</span>
  <span class="dc-sep"></span>
  <button id="ctlReset" title="Reset text &amp; image to auto-fit">⟲ Fit</button>
</div>

<script src="/js/common.js"></script>
<script>
WS.init();
let countdown = null, timerEl = null, countdownSmall = null, timerElSmall = null, qrImg = null, reelActive = false, lastSelected = null, lastStatus = null, lastSig = null;
let spinning = false, lastSpinNonce = null, spinInit = false;

// ---- Operator size controls (font +/- and drag-to-resize image) ------------
// Once the operator touches a control we hand them full manual control: the
// auto-fit stops shrinking so their chosen sizes actually stick. "⟲ Fit" undoes it.
const clampNum = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
let fontScale = clampNum(parseFloat(localStorage.getItem('ws_disp_font')) || 1, 0.6, 2.6);
let imgScale = clampNum(parseFloat(localStorage.getItem('ws_disp_img')) || 1, 0.4, 2.2);
let manualFit = localStorage.getItem('ws_disp_manual') === '1';

function applyFontScale() { document.documentElement.style.fontSize = (16 * fontScale) + 'px'; }
function goManual() { manualFit = true; localStorage.setItem('ws_disp_manual', '1'); }
function setFont(v) {
  fontScale = clampNum(v, 0.6, 2.6);
  localStorage.setItem('ws_disp_font', String(fontScale));
  goManual(); applyFontScale(); fitStage();
}
function wireControls() {
  el('fontUp').addEventListener('click', () => setFont(fontScale + 0.1));
  el('fontDown').addEventListener('click', () => setFont(fontScale - 0.1));
  el('ctlReset').addEventListener('click', () => {
    fontScale = 1; imgScale = 1; manualFit = false;
    localStorage.removeItem('ws_disp_font'); localStorage.removeItem('ws_disp_img'); localStorage.removeItem('ws_disp_manual');
    applyFontScale();
    lastSig = null; if (WS.lastState) render(WS.lastState); // rebuild to clear image widths
  });
}

function boot() {
  if (!WS.session) { el('stage').innerHTML = '<div class="panel">Missing session code.</div>'; return; }
  applyFontScale();
  wireControls();
  WS.startPolling(2500, render);
}

// Persistent QR <img>: created once and reused so the room display never
// refetches (and flashes) it on every poll.
function getQr(code) {
  if (!qrImg) qrImg = h('img', { src: `/api/session/${code}/qr`, alt: 'QR' });
  return qrImg;
}

// The parts of state that actually affect what's drawn (everything EXCEPT the
// ticking timer, which updates itself). Used to skip needless re-renders.
function viewSignature(s) {
  const cfg = s.config || {};
  return JSON.stringify({
    st: s.session.status, sec: s.session.currentSection, sub: s.session.submissionStatus,
    sel: s.session.selectedGroupId, pub: s.session.publicNames,
    notesShared: s.session.notesShared, share: s.shareBase,
    // Every piece of live-editable content is covered, so an "Edit Display"
    // change repaints the projector on the next poll — not on the next slide.
    meta: [cfg.workshopTitle, cfg.purpose, cfg.disclaimer, cfg.welcomeImage, cfg.finalImage, cfg.joinShortUrl],
    agenda: [cfg.agendaIntro, ...(cfg.agenda || [])].join('|'),
    robot: JSON.stringify(cfg.robot || {}),
    secContent: s.currentSection
      ? [s.currentSection.key, s.currentSection.title, s.currentSection.mainPrompt,
         s.currentSection.scenario, s.currentSection.image, (s.currentSection.discuss || []).join('§')]
      : null,
    order: s.sections.map((x) => x.title),
    parts: s.participants.map((p) => [p.id, p.name, p.company, p.groupId, p.isPresenter, p.isRecorder]),
    groups: s.groups.map((g) => [g.id, g.name, g.status, g.heardCount, g.memberIds.join(',')]),
    subs: (s.submissions || []).map((x) => [x.id, x.groupId, x.submitted, x.summary]),
    selAns: (s.selectedGroupAnswers || []).map((a) => [a.sectionOrder, a.summary, a.answers.length]),
    notes: (s.sharedNotes || []).map((n) => [n.id, n.body, n.keyPoint]),
  });
}

function head(state, opts = {}) {
  const rejoin = h('div', { class:'rejoin' }, [
    h('span', { class:'label', text:'REJOIN' }),
    h('span', { class:'mono', text: joinLabel(state) }),
    h('span', { class:'code-pill', text: state.session.code }),
  ]);
  return h('div', { class: 'head' }, [
    h('div', { class: 'brand' }, [ h('span', { class:'slashes', text:'//' }), ' ', (state.config && state.config.workshopTitle) || 'WORKSHOP' ]),
    h('div', { class:'head-right' }, [ opts.timer || null, rejoin ]),
  ]);
}

function ensureTimer() {
  // Create the timer element + its countdown once, then reuse it across renders
  // so we don't leak intervals or reset the clock.
  if (!timerEl) { timerEl = h('div', { class: 'timer huge', text: '--:--' }); countdown = makeCountdown(timerEl, { lowAt: 30000 }); }
  return timerEl;
}
// A smaller timer for the presentation/discussion state.
function ensureTimerSmall() {
  if (!timerElSmall) { timerElSmall = h('div', { class: 'timer big', text: '--:--' }); countdownSmall = makeCountdown(timerElSmall, { lowAt: 30000 }); }
  return timerElSmall;
}

// The projector is a non-interactive surface — nobody stands there scrolling.
// After every render, scale the stage BOTH ways: shrink just enough to fit, or
// grow (up to 1.35×) to fill the screen — maximum possible text size everywhere.
function fitStage() {
  const stage = el('stage');
  // Manual mode: the operator drives font/image size, so don't fight them.
  if (manualFit) { stage.style.zoom = ''; stage.style.minHeight = '100vh'; return; }
  // Measure the TRUE content height (min-height would peg it at 100vh).
  stage.style.zoom = '';
  stage.style.minHeight = '0';
  const need = stage.scrollHeight;
  const zoom = Math.min(1.35, Math.max(0.55, window.innerHeight / need));
  if (zoom < 0.99 || zoom > 1.02) stage.style.zoom = String(zoom);
  // Restore a full-screen stage under whatever zoom was applied.
  stage.style.minHeight = Math.floor(window.innerHeight / (Number(stage.style.zoom) || 1)) + 'px';
}
window.addEventListener('resize', fitStage);

function render(state) {
  const status = state.session.status;
  const stage = el('stage');

  // Wheel-of-fortune: a fresh random pick spins the tire on the room display.
  const spin = state.session.spin;
  if (!spinInit) { spinInit = true; lastSpinNonce = spin ? spin.nonce : null; } // don't replay on refresh
  if (spin && spin.nonce !== lastSpinNonce) { lastSpinNonce = spin.nonce; playWheel(state, spin); return; }
  if (spinning) return; // hold on the wheel until it finishes

  if (!state.session.selectedGroupId) lastSelected = null;

  // Only rebuild the DOM when something visible changed. The timer keeps ticking
  // via its own interval, so idle polls no longer cause the screen to blink.
  const sig = viewSignature(state);
  if (sig === lastSig) { syncTimers(state); return; }
  lastSig = sig;

  // A data-only change (someone joined, a submission landed) re-renders the same
  // slide — keep the scroll position so the room doesn't see the page jump.
  const keepScroll = status === lastStatus ? window.scrollY : 0;

  clear(stage);
  let body;
  switch (status) {
    case 'welcome': body = welcome(state); break;
    case 'agenda': body = agenda(state); break;
    case 'roster': body = roster(state); break;
    case 'robot': body = robot(state); break;
    case 'groups': body = groups(state); break;
    case 'section': body = section(state); break;
    case 'discussion': body = discussion(state); break;
    case 'final': body = final(state); break;
    default: body = welcome(state);
  }
  stage.appendChild(body);
  stage.firstChild && stage.firstChild.classList && stage.firstChild.classList.add('fade');

  // Auto-fit now and again as images finish loading (they change the height).
  fitStage();
  stage.querySelectorAll('img').forEach((im) => {
    if (!im.complete) im.addEventListener('load', fitStage, { once: true });
  });
  window.scrollTo(0, keepScroll);

  syncTimers(state);
  lastStatus = status;
}

function syncTimers(state) {
  if (countdown) countdown.sync(state.session.timer, state.serverNow);
  if (countdownSmall) countdownSmall.sync(state.session.timer, state.serverNow);
  // Live REC light — toggled every poll so it never depends on a full re-render.
  const badge = el('recBadge');
  if (badge) badge.classList.toggle('hidden', !state.session.recordingActive);
}

function escapeXml(s) { return String(s || '').replace(/[<>&]/g, (c) => ({ '<':'&lt;', '>':'&gt;', '&':'&amp;' }[c])); }

// Human-readable "type this to join" text. Uses the configured short URL
// (e.g. bit.ly/BWRW2026) when set; otherwise the real host + /join. The QR
// always encodes the real working URL, so scanning is unaffected.
function joinLabel(state) {
  const short = state.config && state.config.joinShortUrl;
  if (short && String(short).trim()) return String(short).trim();
  return (state.shareBase || location.origin).replace(/^https?:\/\//, '') + '/join';
}

// Reusable "scan to join" card with a live checked-in count — shown on the
// sign-up stages (agenda, roster) so people can keep joining. The QR encodes
// the real working URL; the printed text uses the short URL.
function joinCard(state) {
  return h('div', { class:'roster-join' }, [
    h('div', { class:'label', text:'SCAN TO JOIN' }),
    h('div', { class:'qr', style:'margin-top:8px;' }, [ getQr(state.session.code) ]),
    h('div', { class:'mono', style:'margin-top:8px; font-size:1.05rem;', text: joinLabel(state) }),
    h('div', { class:'code-big', style:'margin-top:2px;', text: state.session.code }),
    h('div', { class:'label', style:'margin-top:14px;', text:'CHECKED IN' }),
    h('div', { class:'display', style:'font-size:2.6rem; line-height:1;', text: String(state.participants.length) }),
  ]);
}

function uniqueImageList(images, fallback) {
  const seen = new Set();
  const out = [];
  for (const src of [...(images || []), ...(fallback ? [fallback] : [])]) {
    if (!src || seen.has(src)) continue;
    seen.add(src);
    out.push(src);
  }
  return out;
}

// Feature image + clickable thumbnails. `key` scopes the remembered selection so
// it survives re-renders but resets when the page (robot vs a round) changes.
let galleryFeatured = null, galleryKey = null, galleryTimer = null;
function imageGallery(images, featureDefault, key, opts = {}) {
  const list = uniqueImageList(images, featureDefault);
  if (galleryTimer) { clearInterval(galleryTimer); galleryTimer = null; } // never leak a rotate timer across renders
  if (!list.length) return h('div', {});
  if (galleryKey !== key || !list.includes(galleryFeatured)) {
    galleryKey = key;
    galleryFeatured = list.includes(featureDefault) ? featureDefault : list[0];
  }
  const feature = h('img', { class: 'feature-img', src: galleryFeatured, alt: 'AI-generated robot concept', style: opts.featureStyle || '' });
  const thumbs = h('div', { class: 'thumbs' + (opts.center ? ' center' : '') });
  const setFeatured = (src) => {
    galleryFeatured = src; feature.src = src;
    thumbs.querySelectorAll('.thumb').forEach((x) => x.classList.toggle('active', x.getAttribute('src') === src));
  };
  if (list.length > 1) {
    for (const src of list) {
      const t = h('img', { class: 'thumb' + (src === galleryFeatured ? ' active' : ''), src, alt: 'Robot concept thumbnail' });
      t.addEventListener('click', () => {
        setFeatured(src);
        if (opts.autoRotateMs) startRotate(); // restart the clock after a manual pick
      });
      thumbs.appendChild(t);
    }
  }
  // Auto-advance through the images (e.g. every 10s on the round slides).
  function startRotate() {
    if (galleryTimer) clearInterval(galleryTimer);
    galleryTimer = setInterval(() => {
      const i = list.indexOf(galleryFeatured);
      setFeatured(list[(i + 1) % list.length]);
    }, opts.autoRotateMs);
  }
  if (opts.autoRotateMs && list.length > 1) startRotate();

  // Optional drag-to-resize grip on the feature image.
  let featureNode = feature;
  if (opts.resizable) {
    const grip = h('div', { class:'img-grip', title:'Drag to resize the image', text:'⤡' });
    featureNode = h('div', { class:'feat-wrap' }, [ feature, grip ]);
  }
  const gallery = h('div', { class: 'gallery' + (opts.center ? ' center' : ''), style: opts.style || '' }, [
    featureNode,
    list.length > 1 ? thumbs : null,
    h('div', { class: 'ai-note', text: '⚠ AI-generated concept — this is not a real robot.' }),
  ]);
  if (opts.resizable) {
    const baseVw = opts.baseVw || 52;
    // Re-apply a previously dragged size, and wire the grip for live resizing.
    if (imgScale !== 1) { gallery.style.flex = '0 0 auto'; gallery.style.width = (imgScale * baseVw) + 'vw'; }
    attachResize(gallery.querySelector('.img-grip'), gallery, baseVw);
  }
  return gallery;
}

// Live drag-to-resize: the operator drags the corner grip to size the image.
function attachResize(grip, galleryEl, baseVw) {
  if (!grip) return;
  grip.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    goManual(); fitStage();              // stop auto-zoom so the drag is 1:1
    const startX = e.clientX;
    const startW = galleryEl.getBoundingClientRect().width;
    const vw = window.innerWidth;
    galleryEl.style.flex = '0 0 auto';
    const move = (ev) => {
      const w = clampNum(startW + (ev.clientX - startX), vw * 0.18, vw * 0.95);
      galleryEl.style.width = w + 'px';
      imgScale = (w / vw) * (100 / baseVw);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      localStorage.setItem('ws_disp_img', String(imgScale));
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  });
}

// Truck-tire "wheel of fortune". Segments are the groups that haven't presented
// yet; it spins and lands on the chosen group, then reveals the presentation.
function playWheel(state, spin) {
  spinning = true;
  const stage = el('stage'); clear(stage);
  const gName = indexBy(state.groups, 'id');
  const ids = (spin.wheel && spin.wheel.length) ? spin.wheel : state.groups.map((g) => g.id);
  const N = ids.length;
  const seg = 360 / N;
  const targetIdx = Math.max(0, ids.indexOf(spin.target));
  const cx = 200, cy = 200, rOuter = 196, rTread = 182, rSlice = 168, rHub = 50;
  const pt = (ang, r) => { const rad = ang * Math.PI / 180; return [cx + r * Math.sin(rad), cy - r * Math.cos(rad)]; };
  const colors = ['#3a3a42', '#1c1c20'];

  let slices = '';
  for (let i = 0; i < N; i++) {
    const a0 = i * seg, a1 = (i + 1) * seg;
    const [x0, y0] = pt(a0, rSlice), [x1, y1] = pt(a1, rSlice);
    const large = seg > 180 ? 1 : 0;
    slices += `<path d="M${cx} ${cy} L${x0.toFixed(1)} ${y0.toFixed(1)} A${rSlice} ${rSlice} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} Z" fill="${colors[i % 2]}" stroke="#050505" stroke-width="1.5"/>`;
    const [lx, ly] = pt(a0 + seg / 2, rSlice * 0.64);
    const name = (gName.get(ids[i]) || {}).name || '';
    slices += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="#f2f2f0" font-weight="800" font-size="${N > 6 ? 13 : 18}" text-anchor="middle" dominant-baseline="middle" transform="rotate(${(a0 + seg / 2).toFixed(1)} ${lx.toFixed(1)} ${ly.toFixed(1)})">${escapeXml(name)}</text>`;
  }
  let tread = '';
  for (let t = 0; t < 72; t++) { const [x0, y0] = pt(t * 5, rOuter), [x1, y1] = pt(t * 5, rTread); tread += `<line x1="${x0.toFixed(1)}" y1="${y0.toFixed(1)}" x2="${x1.toFixed(1)}" y2="${y1.toFixed(1)}" stroke="#050505" stroke-width="3"/>`; }
  const bolts = [0, 60, 120, 180, 240, 300].map((a) => { const [bx, by] = pt(a, rHub * 0.6); return `<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="5" fill="#120a06"/>`; }).join('');

  const svg = `
  <svg viewBox="0 0 400 400" style="width:min(72vh,640px); height:min(72vh,640px);">
    <circle cx="200" cy="200" r="199" fill="#0c0c0d" stroke="#2a2a2e" stroke-width="2"/>
    <g id="wheelSpin">
      <circle cx="200" cy="200" r="${rOuter}" fill="#0e0e10"/>
      ${tread}
      <circle cx="200" cy="200" r="${rSlice + 9}" fill="#0e0e10" stroke="#ff4d1c" stroke-width="3"/>
      ${slices}
      <circle cx="200" cy="200" r="${rSlice}" fill="none" stroke="#ff4d1c" stroke-width="1.5" opacity="0.5"/>
      <circle cx="200" cy="200" r="${rHub}" fill="#ff4d1c"/>
      <circle cx="200" cy="200" r="${rHub - 3}" fill="none" stroke="#120a06" stroke-width="2"/>
      ${bolts}
      <circle cx="200" cy="200" r="9" fill="#120a06"/>
    </g>
    <polygon class="wheel-pointer" points="200,46 184,6 216,6" fill="#ff4d1c" stroke="#120a06" stroke-width="2"/>
  </svg>`;

  stage.appendChild(h('div', { class:'wheel-wrap' }, [
    h('div', { class:'label', style:'font-size:1rem;', text:'SELECTING A GROUP TO PRESENT…' }),
    h('div', { html: svg }),
  ]));

  const g = document.getElementById('wheelSpin');
  const R = 360 * 6 - (targetIdx * seg + seg / 2);
  requestAnimationFrame(() => {
    g.style.transition = 'transform 4.2s cubic-bezier(0.12,0.86,0.18,1)';
    g.style.transform = `rotate(${R}deg)`;
  });
  setTimeout(() => { spinning = false; lastSig = null; render(WS.lastState || state); }, 4700);
}

// ---- States ----------------------------------------------------------------

function welcome(state) {
  const r = state.config && state.config.robot;
  const col = h('div', { class: 'col grow' }, [
    head(state),
    h('div', { class: 'row grow', style: 'align-items:center; gap:56px;' }, [
      h('div', { class: 'col grow' }, [
        h('div', { class: 'label', text: 'STAKEHOLDER REQUIREMENTS EXERCISE' }),
        h('h1', { class: 'display', text: 'Define The Robot' }),
        h('p', { class: 'dim', style:'max-width:44ch; font-size:1.1rem;', text: (state.config && state.config.purpose) || '' }),
        h('div', { class: 'disclaimer', style:'margin-top:8px;', text: (state.config && state.config.disclaimer) || '' }),
        h('div', { class:'row', style:'margin-top:16px; align-items:center; gap:28px;' }, [
          h('div', {}, [ h('div',{class:'label',text:'SCAN TO JOIN'}), h('div', { class: 'qr', style:'margin-top:8px;' }, [ getQr(state.session.code) ]) ]),
          h('div', {}, [
            h('div',{class:'label',text:'OR VISIT'}),
            h('div',{class:'mono', style:'margin-top:8px; font-size:1.15rem;', text: joinLabel(state)}),
            h('div',{class:'code-big', style:'margin-top:6px;', text: state.session.code}),
            h('div',{class:'label', style:'margin-top:14px;', text:'REGISTERED'}),
            h('div',{class:'display', style:'font-size:3rem;', text: String(state.participants.length)}),
          ]),
        ]),
      ]),
      h('div', {}, [
        h('img', { class:'robot-img', src: (state.config && state.config.welcomeImage) || (r && r.images && r.images[0]) || '/assets/robot/robot-placeholder.svg' }),
        h('div', { class:'ai-note', text:'⚠ AI-generated concept — this is not a real robot.' }),
      ]),
    ]),
  ]);
  return col;
}

function agenda(state) {
  const cfg = state.config || {};
  const items = cfg.agenda || [];
  const rows = items.map((item, i) => h('div', { class:'agenda-row join-name' }, [
    h('span', { class:'agenda-num', text: String(i + 1).padStart(2, '0') }),
    h('span', { class:'agenda-txt', text: item }),
  ]));
  return h('div', { class:'col grow' }, [
    head(state),
    h('div', { class:'label', text:'BEFORE WE START' }),
    h('h1', { class:'display', style:'font-size:3rem;', text:'Agenda' }),
    cfg.agendaIntro ? h('p', { class:'dim', style:'max-width:66ch; font-size:1.12rem; margin-top:6px;', text: cfg.agendaIntro }) : null,
    h('div', { class:'row grow', style:'gap:40px; align-items:flex-start; margin-top:18px;' }, [
      h('div', { class:'agenda-list grow' }, rows),
      joinCard(state),
    ]),
  ]);
}

function roster(state) {
  const showNames = state.session.publicNames;
  const people = state.participants.slice().reverse();

  // Live scan-to-join panel so latecomers can still hop on from this screen.
  const joinPanel = h('div', { class:'roster-join' }, [
    h('div', { class:'label', text:'SCAN TO JOIN' }),
    h('div', { class:'qr', style:'margin-top:8px;' }, [ getQr(state.session.code) ]),
    h('div', { class:'mono', style:'margin-top:8px; font-size:1.05rem;', text: joinLabel(state) }),
    h('div', { class:'code-big', style:'margin-top:2px;', text: state.session.code }),
  ]);

  const grid = h('div', { class: 'roster-grid grow', style:'overflow:auto; align-content:flex-start;' });
  if (!people.length) {
    grid.appendChild(h('div', { class:'roster-empty' }, [
      h('div', { class:'label', text:'WAITING FOR PEOPLE TO JOIN' }),
      h('p', { class:'dim', style:'margin-top:8px;', text:'Names will appear here as people register on their phones.' }),
    ]));
  }
  for (const p of people) {
    grid.appendChild(h('div', { class:'roster-card join-name' }, [
      h('div', { class:'nm', text: showNames ? p.name : 'Participant' }),
      h('div', { class:'co', text: showNames ? (p.company || '—') : '' }),
    ]));
  }

  return h('div', { class:'col grow' }, [
    head(state),
    h('div', { class:'spread' }, [
      h('div', {}, [ h('div', { class:'label', text:'PARTICIPANTS' }), h('h1', { text: 'Who\'s In The Room' }) ]),
      h('div', { class:'roster-count' }, [
        h('span', { class:'display', style:'font-size:3.2rem;', text: String(state.participants.length) }),
        h('span', { class:'label', style:'margin-left:10px;', text:'CHECKED IN' }),
      ]),
    ]),
    h('div', { style:'height:16px;' }),
    h('div', { class:'row grow', style:'gap:36px; align-items:flex-start;' }, [
      joinPanel,
      grid,
    ]),
  ]);
}

function robot(state) {
  const r = (state.config && state.config.robot) || {};
  // Older audience: type scales with the screen (clamp), not fixed small sizes.
  const list = (title, arr) => arr && arr.length ? h('div', {}, [
    h('div', { class:'label', style:'font-size:clamp(0.7rem,0.95vw,0.95rem);', text:title }),
    h('ul', { class:'big-list', style:'color:var(--text-dim); font-size:clamp(1.2rem,1.6vw,1.65rem); line-height:1.4; margin-top:6px; padding-left:22px;' }, arr.map((x) => h('li', { text:x }))),
  ]) : null;
  const real = uniqueImageList(r.images);
  const imgs = real.length ? real : ['/assets/robot/robot-placeholder.svg'];
  // Image leads (55% width, cycling). The right column carries only the short,
  // high-value text; the three descriptive lists get a full-width band below so
  // large type has room to breathe instead of wrapping inside a narrow grid cell.
  return h('div', { class:'col grow' }, [
    head(state),
    h('div', { class:'row', style:'gap:36px; align-items:stretch;' }, [
      imageGallery(imgs, imgs[0], 'robot', { style:'flex:1 1 55%; min-width:0;', featureStyle:'width:100%; height:auto;', autoRotateMs: 10000, resizable:true, baseVw:52 }),
      h('div', { class:'col', style:'flex:1 1 45%; min-width:0; gap:12px;' }, [
        h('div', {}, [
          h('div', { class:'label', text:'THE FICTIONAL ROBOT' }),
          h('h1', { class:'display', style:'font-size:clamp(2.4rem,3vw,3.4rem);', text: r.name || 'ROBOT — TBD' }),
          r.tagline ? h('p', { class:'accent', style:'font-size:clamp(1.2rem,1.5vw,1.6rem); margin-top:2px;', text: r.tagline }) : null,
        ]),
        r.task ? h('p', { class:'dim', style:'font-size:clamp(1.25rem,1.7vw,1.75rem); line-height:1.45;' }, [ h('b',{text:'Task: '}), r.task ]) : null,
        r.environment ? h('p', { class:'dim', style:'font-size:clamp(1.25rem,1.7vw,1.75rem); line-height:1.45;' }, [ h('b',{text:'Environment: '}), r.environment ]) : null,
        list('YOUR JOB IS TO DEFINE', r.unresolvedQuestions),
      ]),
    ]),
    h('div', { class:'grid cols-3', style:'gap:16px 32px; margin-top:18px;' }, [
      list('HOW IT WORKS', r.process),
      list('WHAT WE ALREADY KNOW', r.assumptions),
      list('OPERATING LIMITS', r.constraints),
    ]),
  ]);
}

function groups(state) {
  const pById = indexBy(state.participants, 'id');
  const cards = h('div', { class:'grid auto grow', style:'align-content:flex-start;' });
  for (const g of state.groups) {
    const mem = g.memberIds.map((id) => {
      const p = pById.get(id); if (!p) return null;
      const ico = roleIcon(p.isPresenter, p.isRecorder);
      return h('div', { class:'chip', style:'width:100%;' }, [
        h('span', { text: state.session.publicNames ? p.name : 'Member' }),
        h('span', { class:'mute', style:'margin-left:auto; font-size:0.75rem;', text: (state.session.publicNames ? (p.company||'') : '') }),
        ico ? h('span', { class:'role-ico', text: ico }) : null,
      ]);
    }).filter(Boolean);
    cards.appendChild(h('div', { class:'panel hud group-card' }, [
      h('h3', { text: g.name }),
      h('div', { class:'col', style:'gap:6px; margin-top:10px;' }, mem),
    ]));
  }
  return h('div', { class:'col grow' }, [
    head(state, { timer: ensureTimer() }),
    h('div', { class:'label', text:'FIND YOUR GROUP' }),
    h('h1', { text:'Group Assignments' }),
    h('p', { class:'mute', text:'🎤 presenter — shares if picked   ✏️ recorder — types the answer' }),
    cards,
  ]);
}

function section(state) {
  const sec = state.currentSection || {};
  // Submission-status banner at the top.
  const subbar = h('div', { class:'subbar' }, [
    h('span', { class:'label', text:'SUBMISSIONS' }),
    ...state.groups.map((g) => h('span', { class:`st-chip st-${g.status}` }, [ h('span', { class:'dot' }), g.name ])),
    state.groups.length ? null : h('span', { class:'mute mono', text:'no groups yet' }),
  ]);
  const discuss = (sec.discuss && sec.discuss.length)
    ? h('div', { style:'margin-top:14px;' }, [
        h('div', { class:'label', style:'font-size:clamp(0.7rem,0.95vw,0.95rem);', text:'DISCUSS' }),
        h('div', { class:'grid cols-2', style:'gap:6px 32px; margin-top:8px;' },
          sec.discuss.map((q) => h('div', { class:'dim', style:'font-size:clamp(1.2rem,1.6vw,1.65rem);', text: '· ' + q }))),
      ])
    : null;
  // Feature = this round's image; thumbnails = the other robot photos.
  const gal = (state.config && state.config.robot && state.config.robot.images) || [];
  const secImages = uniqueImageList(sec.image ? [sec.image, ...gal] : gal, sec.image);
  return h('div', { class:'col grow compact-head' }, [
    head(state, { timer: ensureTimerSmall() }),
    subbar,
    h('div', { class:'row grow', style:'gap:40px; align-items:flex-start;' }, [
      h('div', { class:'grow', style:'display:flex; flex-direction:column;' }, [
        h('div', { class:'label', text: state.sections.length > 1 ? `ROUND ${sec.order||''}` : 'GROUP EXERCISE' }),
        h('h1', { style:'font-size:clamp(2.4rem,3.2vw,3.4rem);', text: sec.title || '—' }),
        h('p', { class:'accent', style:'font-size:clamp(1.5rem,2.1vw,2.2rem); max-width:48ch; margin-top:10px;', text: sec.mainPrompt || '' }),
        h('p', { class:'dim', style:'font-size:clamp(1.25rem,1.7vw,1.75rem); max-width:60ch; margin-top:10px;', text: sec.scenario || sec.objective || '' }),
        discuss,
      ]),
      secImages.length
        ? imageGallery(secImages, sec.image || secImages[0], 'section:' + (sec.order || ''), { style:'flex:0 0 auto; width:min(52vw,820px);', featureStyle:'width:100%; height:auto;', autoRotateMs: 10000, resizable:true, baseVw:44 })
        : null,
    ]),
  ]);
}

function discussion(state) {
  const g = state.groups.find((x) => x.id === state.session.selectedGroupId);
  const pById = indexBy(state.participants, 'id');
  const answers = state.selectedGroupAnswers || [];

  // Render each round the group answered: headline + its field answers.
  const sectionBlocks = answers.map((a) => h('div', { class:'panel', style:'margin-top:14px;' }, [
    h('div', { class:'spread' }, [
      h('div', { class:'label', text: state.sections.length > 1 ? `ROUND ${a.sectionOrder} — ${a.title}` : a.title }),
      a.submitted ? null : h('span', { class:'pill st-working', style:'font-size:0.65rem;' }, [ h('span',{class:'dot'}), 'DRAFT' ]),
    ]),
    a.summary ? h('p', { class:'accent', style:'font-size:1.25rem; margin-top:8px;', text: a.summary }) : null,
    a.answers.length ? h('div', { class:'grid cols-2', style:'margin-top:10px;' }, a.answers.map((f) => h('div', { class:'panel', style:'background:var(--bg-2);' }, [
      h('div', { class:'label', text: f.label }),
      h('div', { class:'dim', style:'margin-top:6px;', text: f.value }),
    ]))) : null,
  ]));

  // Who does what: the presenter gets a loud callout, the recorder a labelled one.
  const showNames = state.session.publicNames;
  const nameOf = (p, fallback) => (p ? (showNames ? p.name : fallback) : null);
  const presenter = g && g.presenterId ? pById.get(g.presenterId) : null;
  const recorder = g && g.recorderId ? pById.get(g.recorderId) : null;
  const roleRow = g ? h('div', { class:'row', style:'gap:14px; margin:10px 0 4px; flex-wrap:wrap;' }, [
    presenter ? h('div', { class:'role-callout' }, [
      h('span', { style:'font-size:1.5rem;', text:'🎤' }),
      h('div', {}, [ h('div', { class:'label', text:'PRESENTS' }), h('div', { class:'rc-name', text: nameOf(presenter, 'Presenter') }) ]),
    ]) : null,
    recorder ? h('div', { class:'role-callout rc-rec' }, [
      h('span', { style:'font-size:1.5rem;', text:'✏️' }),
      h('div', {}, [ h('div', { class:'label', text:'RECORDED' }), h('div', { class:'rc-name', text: nameOf(recorder, 'Recorder') }) ]),
    ]) : null,
  ]) : null;

  return h('div', { class:'col grow selected-pop' }, [
    head(state, { timer: ensureTimerSmall() }),
    h('div', { class:'label', text:'NOW PRESENTING' }),
    h('h1', { class:'display', style:'font-size:3.6rem;', text: g ? g.name : 'GROUP' }),
    roleRow,
    g ? h('div', { class:'wrap-cols' }, g.memberIds.map(id => { const p=pById.get(id); if (!p) return null; const ico = roleIcon(p.isPresenter, p.isRecorder); return h('span',{class:'chip'},[ (showNames? p.name : 'Member'), ico ? h('span',{class:'role-ico',text:' '+ico}) : null ]); }).filter(Boolean)) : null,
    sectionBlocks.length ? h('div', {}, sectionBlocks)
      : h('div', { class:'banner', style:'margin-top:16px;', text:'This group hasn\'t submitted any answers yet.' }),
    state.session.notesShared && state.sharedNotes.length ? h('div', { class:'panel', style:'margin-top:14px;' }, [
      h('div',{class:'label',text:'FACILITATOR NOTES'}),
      h('ul',{class:'dim',style:'margin-top:6px;'}, state.sharedNotes.map(n => h('li',{text:(n.keyPoint?'⭐ ':'')+n.body}))),
    ]) : null,
  ]);
}

function final(state) {
  const img = state.config && state.config.finalImage;
  return h('div', { class:'col grow' }, [
    head(state),
    h('div', { class:'row', style:'gap:44px; align-items:center;' }, [
      h('div', { class:'col grow' }, [
        h('div', { class:'label', text:'WORKSHOP COMPLETE' }),
        h('h1', { class:'display', text:'Thank You' }),
        h('p', { class:'dim', style:'max-width:52ch; font-size:1.1rem;', text:'You\'ve helped surface the questions, assumptions, and candidate requirements that a real construction-robot PRD would need to resolve.' }),
        h('div', { class:'disclaimer', text: (state.config && state.config.disclaimer) || '' }),
        h('div', { class:'row', style:'margin-top:20px; gap:32px; align-items:center;' }, [
          h('div', {}, [ h('div',{class:'label',text:'GET THE SUMMARY'}), h('div', { class:'qr', style:'margin-top:8px;' }, [ getQr(state.session.code) ]) ]),
          h('div', {}, [
            h('div',{class:'label',text:'NEXT STEPS'}),
            h('ul',{class:'dim',style:'font-size:1.02rem; margin-top:8px;'}, [
              h('li',{text:'The facilitator will compile a Preliminary Robotic Product Requirements Brief.'}),
              h('li',{text:'Consented participants receive the summary by email.'}),
              h('li',{text:'This is stakeholder intelligence — not an approved PRD.'}),
            ]),
          ]),
        ]),
      ]),
      img ? h('div', {}, [ h('img', { class:'robot-img', src: img }), h('div', { class:'ai-note', text:'⚠ AI-generated concept — this is not a real robot.' }) ]) : null,
    ]),
  ]);
}

boot();
</script>
