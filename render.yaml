# Render Blueprint — deploys the workshop as an always-on web service with a
# persistent disk so session data survives restarts. In the Render dashboard:
# "New +" → "Blueprint" → connect this repo. Everything below is applied for you.
services:
  - type: web
    name: robotics-workshop
    runtime: node
    plan: starter            # always-on ($7/mo). Free tier works too but idles + has no disk.
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/workshop.db
      # Live config + uploaded images are stored on the /data disk (seeded from
      # the repo copy on first boot) so facilitator edits survive restarts.
      # Set ALLOW_SIM=1 to enable the testing/simulation tools on this host.
      # Optional: pin the real Render URL so QR/share links are rock-solid even
      # behind proxies. Must be the FUNCTIONAL onrender URL — NEVER a bit.ly
      # short link (that would break every QR + join link). The short URL shown
      # on the sign-up screen is a separate, display-only setting: config
      # "joinShortUrl" (editable in the facilitator's Edit Display panel).
      # - key: BASE_URL
      #   value: https://robotics-workshop-neug.onrender.com
    disk:
      name: workshop-data
      mountPath: /data
      sizeGB: 1
